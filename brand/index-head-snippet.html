<!doctype html>
<!--
  Drop-in <head> snippet for the TeamOfTen favicon + tab title.

  Files needed (copy from brand/ into server/static/):
    server/static/teamoften-mark.svg          — 64×64 master, used at all sizes
    server/static/teamoften-favicon-16.svg    — 16×16 hand-tuned (optional, sharper at tiny sizes)
    server/static/teamoften-mark-180.png      — 180×180 PNG for iOS home-screen (optional)

  In server/main.py the static mount is already / — these files served
  at /teamoften-mark.svg etc. If you serve under /static, prefix the hrefs.

  Add INSIDE the <head> of server/templates/index.html (or wherever the
  app shell lives):
-->

<title>TeamOfTen</title>
<meta name="theme-color" content="#F5832E"/>

<!-- Modern browsers: SVG is sharp at any DPI. -->
<link rel="icon" type="image/svg+xml" href="/teamoften-mark.svg"/>
<!-- 16/32 fallback for the address-bar in older browsers. -->
<link rel="icon" type="image/svg+xml" sizes="16x16 32x32" href="/teamoften-favicon-16.svg"/>
<!-- iOS / iPad home-screen icon — needs a real PNG (no SVG support). -->
<link rel="apple-touch-icon" sizes="180x180" href="/teamoften-mark-180.png"/>

<!-- Optional Open Graph: same mark on a 1200×630 dark card.
     Drop a hand-rendered card at server/static/teamoften-og.png and uncomment.
<meta property="og:image" content="/teamoften-og.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta property="og:title" content="TeamOfTen"/>
<meta property="og:description" content="Ten Claude Code &amp; Codex agents. Zero drift."/>
-->
