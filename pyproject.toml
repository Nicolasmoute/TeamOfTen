[project]
name = "teamoften-harness"
version = "0.2.0"
description = "Personal orchestration harness — Coach + 10 Players, Claude Code agents"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "claude-agent-sdk>=0.1.60",
    "aiosqlite>=0.20",
    "python-multipart>=0.0.9",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["server"]

[tool.setuptools.package-data]
server = ["*.html", "static/*.html", "static/*.js", "static/*.css"]
