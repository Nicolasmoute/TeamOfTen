[project]
name = "teamoften-harness"
version = "0.1.0"
description = "Personal orchestration harness — 1 coordinator + 10 Claude Code worker agents"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "claude-agent-sdk>=0.1.60",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["server"]

[tool.setuptools.package-data]
server = ["*.html"]
