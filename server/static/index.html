<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TeamOfTen</title>
    <meta name="theme-color" content="#F5832E" />
    <!-- TeamOfTen brand mark — orange "10" disk. Source SVGs in brand/.
         Modern browsers use the master SVG at any DPI; the 16-tuned
         SVG is a fallback for old address-bar renderers; the 180×180
         PNG covers iOS home-screen (no SVG support there). -->
    <link rel="icon" type="image/svg+xml" href="/static/teamoften-mark.svg" />
    <link
      rel="icon"
      type="image/svg+xml"
      sizes="16x16 32x32"
      href="/static/teamoften-favicon-16.svg"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/static/teamoften-mark-180.png"
    />
    <!-- highlight.js theme — dark variant to match the harness UI.
         Vendored under /static/vendor/ (see scripts/vendor_deps.py)
         so cold loads don't depend on jsdelivr. -->
    <link rel="stylesheet" href="/static/vendor/hljs-github-dark.css" />
    <!-- KaTeX font + layout CSS for math rendered by markdown.js.
         Vendored CSS, but the @font-face URLs point at jsdelivr's
         /dist/fonts/ directory (rewritten by scripts/vendor_deps.py)
         so we don't have to vendor 12 binary font files. The browser
         only fetches a font on first use. -->
    <link rel="stylesheet" href="/static/vendor/katex.css" />
    <link rel="stylesheet" href="/static/style.css" />
    <!-- Compass dashboard — harness-styled v1. Loaded after style.css
         so its rules can override base pane chrome where needed.
         The script is loaded as an ES module by app.js (re-exports the
         CompassPane component); no separate <script> tag here keeps
         the load order deterministic. -->
    <link rel="stylesheet" href="/static/compass.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
